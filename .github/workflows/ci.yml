name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }}
      - name: Install intent-vector-db (the intent-db library, public git) and this package
        run: |
          uv pip install "intent-vector-db @ git+https://github.com/harsharahul/intent-db@main"
          uv pip install --no-sources -e ".[treesitter,dev]"
      - name: Run tests
        run: uv run --no-sync pytest -q
      - name: Audit dependencies for known vulnerabilities
        run: uv run --no-sync pip-audit --skip-editable
